name: PR & SonarQube Analysis

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    paths:
      - "chaekit-spring/**"
    types: [opened, synchronize, reopened]

permissions: write-all

jobs:
  test-and-sonar:
    name: Test, Coverage, and Sonar Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chaekit-spring

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Grant execute permission to Gradle
        run: chmod +x ./gradlew

      - name: Run tests with coverage (fail on error)
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Report test coverage in PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.6
        with:
          title: Test Coverage Report
          paths: chaekit-spring/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: SonarQube Analysis
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info
